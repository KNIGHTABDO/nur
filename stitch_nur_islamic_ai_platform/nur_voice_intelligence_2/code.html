<style>

        }

            box-shadow: 0 0 40px 0px rgba(0, 0, 0, 0.4);
        }

        /* Abstract Particle System */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212,175,55,0.8) 0%, rgba(212,175,55,0) 70%);
            pointer-events: none;
        }

        /* Geometric Background Pattern */
        .islamic-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;

<body class="h-screen w-screen flex items-center justify-center relative overflow-hidden font-body-md antialiased">
<!-- Ambient Background / Canvas -->
<div class="absolute inset-0 bg-gradient-to-b from-surface-container-lowest via-surface-container-low to-background z-0"></div>
<!-- Deep Space Geometric Overlay -->
<div class="absolute inset-0 islamic-pattern z-0"></div>
<!-- Central Cinematic Lighting Aura -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] mix-blend-screen z-0 pointer-events-none"></div>
<!-- Navigation Shell (TopAppBar for Mobile Context/Fallback - Suppressed as per instructions for Voice Mode focus, but included structurally if needed. Voice mode is a focused journey, so shell is suppressed.) -->
<!-- Suppressed Top Nav -->
<div class="absolute top-0 left-0 w-full p-6 z-50 flex justify-between items-center opacity-50 hover:opacity-100 transition-opacity">
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2" onclick="closeVoiceMode()">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
<span class="font-label-md text-label-md">Close</span>
</button>
<div class="font-headline-md text-headline-md font-medium text-primary tracking-widest opacity-30">NUR</div>
<div class="w-20"></div> <!-- Spacer for balance -->
</div>
<!-- Main Canvas: Voice Interaction Interface -->
<main class="relative z-10 flex flex-col items-center justify-center w-full max-w-4xl px-4">
<!-- The Spiritual Orb (Core AI Entity) -->
<div class="relative w-64 h-64 md:w-96 md:h-96 flex items-center justify-center mb-16 animate-float">
<!-- Outer Ripple Rings -->
<div class="absolute inset-0 flex items-center justify-center" id="ripple-container">
<div class="absolute w-full h-full border border-primary/20 rounded-full animate-ping" style="animation-duration: 3s;"></div>
<div class="absolute w-[120%] h-[120%] border border-primary/10 rounded-full animate-ping" style="animation-duration: 4s; animation-delay: 1s;"></div>
<div class="absolute w-[140%] h-[140%] border border-primary/5 rounded-full animate-ping" style="animation-duration: 5s; animation-delay: 2s;"></div>
</div>
<!-- The Core Orb -->
<div class="relative w-32 h-32 md:w-48 md:h-48 rounded-full bg-gradient-to-br from-primary via-primary-container to-background flex items-center justify-center orb-glow">

<div class="absolute inset-2 rounded-full bg-background/80 backdrop-blur-md flex items-center justify-center overflow-hidden">
<!-- Dynamic Waveform Visualizer inside Orb -->

<div class="w-1 bg-primary rounded-full h-2 animate-wave" style="animation-delay: 0.1s"></div>
<div class="w-1 bg-primary rounded-full h-6 animate-wave" style="animation-delay: 0.2s"></div>
<div class="w-1 bg-primary rounded-full h-10 animate-wave" style="animation-delay: 0.3s"></div>
<div class="w-1 bg-primary rounded-full h-4 animate-wave" style="animation-delay: 0.4s"></div>

</svg>

                Listening...

            </p>

<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>

</button>

<!-- Ambient Particles Container -->
<div class="absolute inset-0 pointer-events-none z-0" id="particles"></div>
<script>
        // Simulate ambient waveform background
        const waveformContainer = document.getElementById('ambient-waveform');
        const numBars = Math.floor(window.innerWidth / 8); // Density based on screen width
        
        for (let i = 0; i < numBars; i++) {
            const bar = document.createElement('div');
            // Calculate a bell curve distribution for height to make the center taller
            const centerDist = Math.abs((i / numBars) - 0.5) * 2; // 0 at center, 1 at edges
            const baseHeight = Math.max(10, 100 * (1 - Math.pow(centerDist, 2))); // Bell curve shape
            
            bar.className = 'w-1 bg-gradient-to-t from-transparent via-primary/40 to-transparent rounded-full animate-wave';
            bar.style.height = `${baseHeight}%`;
            // Randomize animation duration and delay slightly for organic feel
            bar.style.animationDuration = `${1 + Math.random() * 2}s`;
            bar.style.animationDelay = `${Math.random() * -2}s`; // Negative delay to start immediately
            
            waveformContainer.appendChild(bar);
        }

        // Particle System
        const particlesContainer = document.getElementById('particles');
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            const size = Math.random() * 4 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            // Start from center
            particle.style.left = '50%';
            particle.style.top = '50%';
            
            particlesContainer.appendChild(particle);
            
            // Random trajectory
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 100 + 50;
            const tx = Math.cos(angle) * velocity;
            const ty = Math.sin(angle) * velocity;
            const duration = Math.random() * 3000 + 2000;
            
            particle.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: 0.8 },
                { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
            ], {
                duration: duration,
                easing: 'cubic-bezier(0, .9, .57, 1)'
            }).onfinish = () => particle.remove();
        }

        // Spawn particles periodically
        setInterval(createParticle, 200);

        // Simulation for dynamic voice reaction
        const visualizerBars = document.querySelectorAll('#orb-visualizer div');
        setInterval(() => {
            // Simulate speaking intensity varying
            const isSpeaking = Math.random() > 0.3;
            if(isSpeaking) {
                visualizerBars.forEach(bar => {
                    bar.style.height = `${Math.random() * 80 + 20}%`;
                });
            } else {
                visualizerBars.forEach(bar => {
                    bar.style.height = `${Math.random() * 20 + 10}%`;
                });
            }
        }, 150);

        function closeVoiceMode() {
            // Placeholder for close action
            console.log('Closing voice mode...');
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease';
        }
    </script>
